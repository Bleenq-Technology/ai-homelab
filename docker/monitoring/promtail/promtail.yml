server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ---- Host system logs (/var/log/*log) ----
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: jarvis
          __path__: /var/log/*log

  # ---- Docker containers via the Docker API (service discovery) ----
  # Discovers every container and ships stdout/stderr to Loki with clean,
  # low-cardinality labels from Docker/Compose metadata. Promtail reads the log
  # stream through the socket, so messages arrive already de-JSON'd (no pipeline
  # parsing needed). Query in Grafana with e.g. {container="openwebui"} or
  # {compose_service="litellm"}.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # /openwebui -> openwebui
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - target_label: 'job'
        replacement: 'docker'
      - target_label: 'host'
        replacement: 'jarvis'

  # ---- Host systemd journal ----
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
        host: jarvis
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
