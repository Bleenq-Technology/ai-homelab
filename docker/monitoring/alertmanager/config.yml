# Alertmanager — routes Prometheus alerts (../prometheus/alert_rules.yml) to Discord.
#
# The Discord webhook URL is a secret: it is mounted as a Docker secret at
# /run/secrets/discord_webhook_url (see ../compose.monitoring.yml + ../secrets/)
# and referenced via `webhook_url_file`, so nothing sensitive is committed.
# NOTE: Alertmanager does NOT expand ${ENV} in this file — use *_file fields.

route:
  # Group alerts so a burst (e.g. several InstanceDown at once) is one message.
  group_by: ['alertname']
  group_wait: 30s        # batch alerts that fire close together
  group_interval: 5m     # wait before sending new alerts for an existing group
  repeat_interval: 3h    # re-notify for a still-firing alert this often
  receiver: 'discord'

  routes:
    # Always-firing Watchdog (if present) is a dead-man's-switch — never notify.
    - match:
        alertname: Watchdog
      receiver: 'null'

receivers:
  - name: 'null'

  - name: 'discord'
    discord_configs:
      - webhook_url_file: /run/secrets/discord_webhook_url
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴 FIRING{{ else }}✅ RESOLVED{{ end }}: {{ .CommonLabels.alertname }}{{ if gt (len .Alerts.Firing) 1 }} ×{{ len .Alerts.Firing }}{{ end }}'
        message: |
          {{ range .Alerts }}**[{{ .Labels.severity | toUpper }}]** {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
