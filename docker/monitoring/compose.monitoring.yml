# ============================================================================
# MONITORING stack — metrics, logs, dashboards, alerting, uptime, auto-updates
# Exporters that read data-layer services attach to the `data` network too.
# ============================================================================

networks:
  proxy:
    external: true
  data:
    external: true
  ai:
    external: true
  monitoring:
    external: true

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:
  uptime_kuma_data:
  promtail_positions:

services:

  # ---- Prometheus ---------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    networks: [proxy, monitoring]
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on: [alertmanager]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.middlewares=secure-sso@file"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  # ---- Alertmanager -------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    restart: unless-stopped
    networks: [proxy, monitoring]
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${DOMAIN}`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls=true"
      - "traefik.http.routers.alertmanager.middlewares=secure-sso@file"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  # ---- Grafana ------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    networks: [proxy, monitoring]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      # ---- Keycloak SSO (generic OAuth); local admin login kept as break-glass ----
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://keycloak.${DOMAIN}/realms/homelab/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://keycloak.${DOMAIN}/realms/homelab/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: https://keycloak.${DOMAIN}/realms/homelab/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "'Admin'"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "false"
      # Shared Mailjet SMTP creds (referenced by grafana.ini via $__env{}); from Infisical
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      TZ: ${TZ}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.middlewares=secure-chain@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ---- Loki ---------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ---- Promtail (log shipper) ---------------------------------------------
  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - /var/log:/var/log:ro
      # Docker service discovery: enumerate containers + read their logs via the API
      # (replaces tailing /var/lib/docker/containers/*-json.log — gives clean
      # container/compose labels instead of parsing raw JSON files).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail:/etc/promtail:ro
      # Persist read positions so a restart resumes instead of re-ingesting all
      # container log history (which bursts past Loki's ingestion rate limit).
      - promtail_positions:/promtail
    command: -config.file=/etc/promtail/promtail.yml

  # ---- Telegraf (per-container metrics via the Docker Engine API) ---------
  # Replaces cadvisor: it reads container stats straight from the Docker API,
  # so it gets real container names/compose labels even with the containerd
  # image store (which broke cadvisor's cgroup->name mapping). Prometheus format.
  telegraf:
    image: telegraf:1.34-alpine
    container_name: telegraf
    restart: unless-stopped
    networks: [monitoring]
    user: telegraf
    group_add:
      - "980"   # host 'docker' group gid, to read /var/run/docker.sock
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ---- Node Exporter (host metrics) ---------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    networks: [monitoring]
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave

  # ---- NVIDIA GPU Exporter (nvidia-smi -> Prometheus) ---------------------
  # Scrapes the RTX 3090: utilisation, VRAM used/total, temp, power, clocks.
  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.2.0
    container_name: nvidia-gpu-exporter
    restart: unless-stopped
    networks: [monitoring]
    # The `utility` driver capability mounts nvidia-smi + the management libs.
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility
    # Pin an explicit field list: AUTO-discovery panics on newer nvidia-smi
    # fields like "clocks_event_reasons_counters.sync_boost [us]" (invalid metric
    # name). These cover util, VRAM, temp, power, fan, and clocks.
    command:
      - '--query-field-names=utilization.gpu,utilization.memory,memory.total,memory.used,memory.free,temperature.gpu,power.draw,fan.speed,clocks.current.graphics,clocks.current.sm,clocks.current.memory'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ---- Blackbox Exporter --------------------------------------------------
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - ./blackbox-exporter/config:/config:ro
    command:
      - '--config.file=/config/blackbox.yml'
      - '--web.listen-address=:9115'

  # ---- Exporters that read the data layer ---------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    restart: unless-stopped
    networks: [data, monitoring]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_SUPERUSER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter
    restart: unless-stopped
    networks: [data, monitoring]
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # clickhouse-exporter removed: the f1yegor image is unmaintained and panics on
  # startup. TODO: scrape ClickHouse's native Prometheus endpoint instead — enable
  # <prometheus> on :9363 via a config.d file, then add a clickhouse:9363 scrape job.

  adguard-exporter:
    image: ebrianne/adguard-exporter:latest
    container_name: adguard-exporter
    restart: unless-stopped
    networks: [proxy, monitoring]
    environment:
      ADGUARD_PROTOCOL: http
      ADGUARD_HOSTNAME: adguard
      ADGUARD_PORT: "80"
      ADGUARD_USERNAME: ${ADGUARD_USERNAME:-admin}
      ADGUARD_PASSWORD: ${ADGUARD_PASSWORD:-change_me_adguard}

  # ---- Watchtower (auto-update labelled containers) -----------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    networks: [monitoring]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.44"   # Engine 29 rejects watchtower's legacy default
    command:
      - '--interval=3600'
      - '--cleanup'
      - '--label-enable'

  # ---- Uptime Kuma --------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: uptime-kuma
    restart: unless-stopped
    # All four segments so it can health-check every service directly on its
    # internal container endpoint (bypasses Traefik forward-auth -> true backend
    # health, clean 200s, no SSO redirects).
    networks: [proxy, ai, data, monitoring]
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`uptime.${DOMAIN}`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls=true"
      - "traefik.http.routers.uptime.middlewares=sso@file,secure-chain-stream@file"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"
