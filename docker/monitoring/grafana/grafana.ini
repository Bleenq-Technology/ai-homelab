[smtp]
enabled = true
# Shared Mailjet creds come from the SMTP_* env vars (Infisical -> .env -> compose);
# nothing sensitive is committed here. See compose.monitoring.yml grafana env.
host = $__env{SMTP_HOST}:$__env{SMTP_PORT}
user = $__env{SMTP_USER}
password = $__env{SMTP_PASSWORD}
;cert_file =
;key_file =
skip_verify = false
from_address = $__env{SMTP_FROM}
from_name = Vilevac Grafana Alerts
startTLS_policy = OpportunisticStartTLS
