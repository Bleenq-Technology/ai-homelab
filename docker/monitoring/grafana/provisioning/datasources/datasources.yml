apiVersion: 1

datasources:
  # Prometheus
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"

  # Loki
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    version: 1
    editable: true
    jsonData:
      maxLines: 1000

  # Alertmanager
  - name: Alertmanager
    type: camptocamp-prometheus-alertmanager-datasource
    access: proxy
    url: http://alertmanager:9093
    editable: true
    jsonData:
      implementation: prometheus
      disableDeleteAlerts: false
      disableCreateAlert: false

  # QuestDB — market/time-series data, queried over the Postgres wire protocol
  # (reached via the shared `proxy` network). Password is injected from the
  # QUESTDB_PG_PASSWORD env (Infisical -> .env -> grafana service).
  - name: QuestDB
    type: postgres
    uid: questdb
    access: proxy
    url: questdb:8812
    user: ${QUESTDB_PG_USER}
    editable: true
    jsonData:
      database: qdb
      sslmode: disable
      postgresVersion: 1200
    secureJsonData:
      password: ${QUESTDB_PG_PASSWORD}
