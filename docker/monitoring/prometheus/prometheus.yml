global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Traefik internal metrics entrypoint (see core/traefik/config/traefik.yml)
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']

  - job_name: 'telegraf'
    static_configs:
      - targets: ['telegraf:9273']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # zoomie — Paul's Windows workstation (Telegraf prometheus_client on :9273).
  # External LAN host on 192.168.1.0/24, reached cross-subnet via the EdgeRouter
  # (Prometheus egresses as the jarvis host IP 192.168.2.10). Captures CPU/mem/disk +
  # RTX 5070 Ti GPU power/temp; up==0 marks the workstation's frequent reboots.
  - job_name: 'zoomie'
    static_configs:
      - targets: ['192.168.1.10:9273']
    metric_relabel_configs:
      # nvidia_smi attaches volatile labels (pstate flips every scrape) that churn
      # the GPU time series and break graph continuity — drop the noisy ones.
      - regex: 'pstate|display_mode|display_active|compute_mode|vbios_version|serial'
        action: labeldrop

  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # QuestDB operational metrics (ingest/query/health — NOT the market data itself)
  - job_name: 'questdb'
    static_configs:
      - targets: ['questdb:9003']

  # ClickHouse native Prometheus endpoint (replaces the removed clickhouse-exporter)
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']

  # MinIO exposes cluster metrics without a bearer token because the service sets
  # MINIO_PROMETHEUS_AUTH_TYPE=public (see data/compose.data.yml).
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'adguard-exporter'
    static_configs:
      - targets: ['adguard-exporter:9617']

  # NOTE: 'clickhouse-exporter' and 'watchtower' scrape jobs removed — the
  # clickhouse-exporter container is gone (unmaintained image; see compose), and
  # watchtower doesn't expose a metrics endpoint here (no HTTP API token wired).
  # Both were permanently up==0 and fired false InstanceDown alerts.

  - job_name: 'keycloak'
    metrics_path: /metrics
    static_configs:
      - targets: ['keycloak:9000']

  # Endpoint reachability via Blackbox (HTTPS through Traefik)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://traefik.pdx.sanctioned.tech
          - https://grafana.pdx.sanctioned.tech
          - https://keycloak.pdx.sanctioned.tech
          - https://portainer.pdx.sanctioned.tech
          - https://minio.pdx.sanctioned.tech
          - https://openwebui.pdx.sanctioned.tech
          - https://n8n.pdx.sanctioned.tech
          - https://langfuse.pdx.sanctioned.tech
          - https://uptime.pdx.sanctioned.tech
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
