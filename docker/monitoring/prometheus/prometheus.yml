global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Traefik internal metrics entrypoint (see core/traefik/config/traefik.yml)
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']

  - job_name: 'telegraf'
    static_configs:
      - targets: ['telegraf:9273']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'clickhouse-exporter'
    static_configs:
      - targets: ['clickhouse-exporter:9116']

  - job_name: 'adguard-exporter'
    static_configs:
      - targets: ['adguard-exporter:9617']

  - job_name: 'watchtower'
    static_configs:
      - targets: ['watchtower:9091']

  - job_name: 'keycloak'
    metrics_path: /metrics
    static_configs:
      - targets: ['keycloak:9000']

  # Endpoint reachability via Blackbox (HTTPS through Traefik)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://traefik.pdx.sanctioned.tech
          - https://grafana.pdx.sanctioned.tech
          - https://keycloak.pdx.sanctioned.tech
          - https://portainer.pdx.sanctioned.tech
          - https://minio.pdx.sanctioned.tech
          - https://openwebui.pdx.sanctioned.tech
          - https://n8n.pdx.sanctioned.tech
          - https://langfuse.pdx.sanctioned.tech
          - https://uptime.pdx.sanctioned.tech
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
