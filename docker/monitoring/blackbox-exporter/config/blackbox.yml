modules:
  http_2xx:
    prober: http
    timeout: 30s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []
      method: GET
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
      tls_config:
        insecure_skip_verify: true
  http_2xx_auth:
    prober: http
    timeout: 30s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      method: GET
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
      tls_config:
        insecure_skip_verify: true
      basic_auth:
        username: "${BASIC_AUTH_USER}"
        password: "${BASIC_AUTH_PASSWORD}"
  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
  icmp:
    prober: icmp
    timeout: 10s
    icmp:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
  dns:
    prober: dns
    dns:
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false
      query_name: "example.com"
      query_type: "A"
      valid_rcodes: ["NOERROR"]
      validate_answer_rrs:
        fail_if_none_matches_regexp:
          - ".+"
