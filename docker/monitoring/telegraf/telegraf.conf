# Telegraf — per-container metrics via the Docker Engine API, exposed in
# Prometheus format. Replaces cadvisor, whose Docker factory can't map cgroups
# to names when Docker uses the containerd image store. The Docker API returns
# CPU/mem/net/blkio per container WITH the friendly name regardless of storage
# driver.
[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "15s"
  hostname = "jarvis"
  omit_hostname = false

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  source_tag = false
  timeout = "5s"
  # per-container CPU / memory / network / block IO
  # (memory is always totalled, so it isn't a total_include choice)
  perdevice_include = ["cpu", "blkio", "network"]
  total_include = ["cpu", "blkio", "network"]
  container_name_include = []
  container_name_exclude = []
  # keep useful compose labels as tags (skip the rest to avoid cardinality)
  docker_label_include = ["com.docker.compose.service", "com.docker.compose.project"]
  docker_label_exclude = []

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
  export_timestamp = false
