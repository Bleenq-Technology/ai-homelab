# LiteLLM proxy — OpenAI-compatible gateway in front of the local unsloth LLM,
# with every request/response logged to Langfuse. Point clients here instead of
# at unsloth directly, and all calls are traced centrally.
model_list:
  - model_name: unsloth/Qwen3-8B-GGUF            # name clients request
    litellm_params:
      model: openai/unsloth/Qwen3-8B-GGUF        # openai/ = OpenAI-compatible upstream
      api_base: http://192.168.2.10:8888/v1      # unsloth runs on the host
      api_key: os.environ/UNSLOTH_API_KEY

  - model_name: bge-m3                           # 1024-dim embeddings (BGE-M3)
    litellm_params:
      model: openai/bge-m3                       # llama.cpp server, OpenAI-compatible
      api_base: http://bge-m3:8080/v1            # internal ai-net container
      api_key: "sk-noauth"                       # llama.cpp on ai-net has no auth; value unused

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  drop_params: true
  # Note: LiteLLM's Prometheus /metrics emission is gated behind an enterprise
  # license (OSS loads the callback but emits nothing), so LLM-level analytics
  # live in Langfuse instead. Grafana covers LLM *traffic* via Traefik router
  # metrics + per-container resource usage via cAdvisor.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY      # clients send: Authorization: Bearer <master key>
