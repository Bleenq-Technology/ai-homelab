# ============================================================================
# Traefik dynamic configuration — reusable middlewares (file provider, hot-reloaded)
# Attach to any service with a single label:  traefik.http.routers.<r>.middlewares=secure-chain@file
# ============================================================================
http:
  routers:
    # oauth2-proxy serves the central auth domain AND the /oauth2/* paths on every
    # host (high priority so /oauth2/ wins over a service's own host router). The
    # wildcard *.pdx cert covers auth.pdx automatically.
    oauth2-proxy:
      rule: "Host(`auth.pdx.sanctioned.tech`) || PathPrefix(`/oauth2/`)"
      entryPoints: ["websecure"]
      service: oauth2-proxy
      priority: 1000
      tls: {}

    # Friendly entry point: account.${DOMAIN} -> Keycloak homelab "Signing in" page.
    # Lets users manage passkeys/2FA without knowing the realm URL. The redirect
    # middleware answers before the service is ever used (service is just a required
    # placeholder). Wildcard *.pdx cert covers account.pdx automatically.
    account-redirect:
      rule: "Host(`account.pdx.sanctioned.tech`)"
      entryPoints: ["websecure"]
      service: oauth2-proxy
      middlewares: ["account-redirect"]
      tls: {}

  services:
    oauth2-proxy:
      loadBalancer:
        servers:
          - url: "http://oauth2-proxy:4180"

  middlewares:

    # ---- account.${DOMAIN} -> Keycloak homelab "Signing in" page ----
    # 302 (not permanent) so the target can change later without poisoning caches.
    account-redirect:
      redirectRegex:
        regex: ".*"
        replacement: "https://keycloak.pdx.sanctioned.tech/realms/homelab/account/account-security/signing-in"
        permanent: false

    # ---- Security headers (incl. HSTS) ----
    security-headers:
      headers:
        # HSTS — 2 years, includeSubDomains, preload-eligible.
        # Only fully safe once every name is HTTPS-only (it is, behind Traefik).
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""

    # ---- Security headers, but SAME-ORIGIN framing allowed ----
    # Identical to security-headers except X-Frame-Options: SAMEORIGIN instead of DENY.
    # Keycloak's admin console + login themes embed their OWN same-origin iframes (the
    # 3p-cookies cookie-probe, the login-status session iframe); DENY blocks ALL framing
    # and hangs the console with "Timeout when waiting for 3rd party check iframe message".
    # SAMEORIGIN still blocks cross-origin framing (clickjacking), so it's the only relaxation.
    security-headers-frameable:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "SAMEORIGIN"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""

    # ---- Rate limiting (per source IP) ----
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # ---- Compression ----
    compress:
      compress: {}

    # ---- oauth2-proxy SSO (the secure-sso/sso chains below switch to these) ----
    # forwardAuth -> /oauth2/auth returns 401 when unauthenticated; the `errors`
    # middleware rewrites that 401 into a 302 to the Keycloak login (carrying the
    # original URL in rd=). Both must be chained, in this order.
    sso-auth:
      forwardAuth:
        address: "http://oauth2-proxy:4180/oauth2/auth"
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - X-Auth-Request-Groups
    sso-errors:
      errors:
        # ONLY 401 — that's the single status /oauth2/auth emits when unauthenticated.
        # Do NOT widen to 401-403: a gated app's own 403/402 (e.g. MLflow's host-header
        # guard) would otherwise be hijacked and disguised as the Keycloak login redirect.
        status:
          - "401"
        service: oauth2-proxy
        query: "/oauth2/sign_in?rd={url}"
        # /oauth2/auth answers 401 when unauthenticated; Traefik would relay that 401
        # as-is, so rewrite it to 302 to make the browser follow the Location to the
        # Keycloak login. (403 is intentionally NOT rewritten — that's a real authz
        # denial and should surface, not loop back to login.)
        statusRewrites:
          "401": 302

    # ---- Keycloak SSO gate (oauth2-proxy) ----
    # auth + 401->login redirect. Attach as `sso@file`, or `secure-sso@file` to
    # combine with the hardening chain. (Was traefik-forward-auth; see dynamic.yml.tfa-bak.)
    sso:
      chain:
        middlewares:
          - sso-errors
          - sso-auth

    # ---- Reusable chain: attach this ONE name to most services ----
    secure-chain:
      chain:
        middlewares:
          - security-headers
          - rate-limit
          - compress

    # ---- secure-chain but permits same-origin framing — for Keycloak only ----
    # (see security-headers-frameable). Every other service keeps DENY-by-default secure-chain.
    secure-chain-frameable:
      chain:
        middlewares:
          - security-headers-frameable
          - rate-limit
          - compress

    # ---- secure-chain + SSO gate, for services with no native auth ----
    secure-sso:
      chain:
        middlewares:
          - sso-errors
          - sso-auth
          - security-headers
          - rate-limit
          - compress

    # ---- Looser chain for streaming/websocket apps (chat, comfyui) ----
    # Same hardening, higher rate ceiling for long-lived/streaming connections.
    secure-chain-stream:
      chain:
        middlewares:
          - security-headers
          - compress
